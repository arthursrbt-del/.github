name: Render RMarkdown

on:
  push:
    branches: [ main ]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout-repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install packages
        run: |
          Rscript -e 'install.packages(c("rmarkdown", "knitr", "flexdashboard", "dplyr", "lubridate", "data.table", "ggplot2", "scales", "tidytext", "tidyverse"))'
          # ======= ADICIONEI O "tidyverse" NO FINAL DA LISTA ACIMA =======

      - name: Render Rmd
        run: |
          Rscript -e 'rmarkdown::render("Trabalho_Pratico_dashboard.Rmd", output_format = "flexdashboard::flex_dashboard")'
          Rscript -e 'rmarkdown::render("trabalho_analise_de_dados_spotify.Rmd", output_format = "flexdashboard::flex_dashboard")'
          # ======= ADICIONEI A LINHA DO SEU NOVO ARQUIVO ACIMA =======

      - name: Commit and Push HTML
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add Trabalho_Pratico_dashboard.html trabalho_analise_de_dados_spotify.html
          # ======= ADICIONEI O NOVO HTML NA LINHA DE CIMA =======
          git commit -m "Auto-render Rmds to HTML" || echo "Sem alterações para commitar"
          git push
