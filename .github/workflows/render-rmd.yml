name: Render RMarkdown

on:
  push:
    branches: [ main ] # Executa o script toda vez que você atualizar a branch main

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout-repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        run: |
          Rscript -e 'install.packages(c("rmarkdown", "knitr", "flexdashboard", "dplyr", "lubridate", "data.table", "ggplot2", "scales", "tidytext"))'

      - name: Render Rmd
        run: |
          Rscript -e 'rmarkdown::render("Trabalho_Pratico_dashboard.Rmd", output_format = "flexdashboard::flex_dashboard")'

      - name: Commit and Push HTML
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add Trabalho_Pratico_dashboard.html
          git commit -m "Auto-render Rmd to HTML" || echo "Sem alterações para commitar"
          git push
